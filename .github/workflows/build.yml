on: [push, pull_request, workflow_dispatch]

name: Build

jobs:
  build:
    runs-on: ubuntu-latest
    # 2026年9月のNode.js 20廃止に伴う警告を解消し、Node.js 24で実行する設定
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    container:
      # 最新のZMKビルド環境イメージ
      image: zmkfirmware/zmk-build-arm:3.5
    
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build
        # ボード名に seeeduino_xiao_ble を指定
        run: west build -s zmk/app -b seeeduino_xiao_ble -- -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: DTS File (Debug)
        if: ${{ always() }}
        run: |
          if [ -f build/zephyr/seeeduino_xiao_ble.dts.pre.tmp ]; then
            cat -n build/zephyr/seeeduino_xiao_ble.dts.pre.tmp
          fi

      - name: Kconfig file (Debug)
        run: grep -v "^#" build/zephyr/.config | grep -v "^$" || true

      - name: Rename zmk.uf2
        run: cp build/zephyr/zmk.uf2 xiao_ble_firmware.uf2

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: xiao_ble_firmware.uf2

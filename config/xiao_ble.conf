# I2C/Pointingの既存設定
CONFIG_ZMK_POINTING=y
CONFIG_I2C=y

# Bluetooth設定（前回修正分）
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="Xiao-Cirque"
CONFIG_BT_DEVICE_NAME_MAX=32

# --- zmk-rgbled-widget の設定 ---
CONFIG_RGBLED_WIDGET=y


# オプション：USB接続が優先されている時にシアン（水色）で点滅させる
CONFIG_RGBLED_WIDGET_CONN_SHOW_USB=y
